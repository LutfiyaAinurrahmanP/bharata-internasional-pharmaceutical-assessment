version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-root}
    volumes:
      - mongo_data:/data/db
    networks:
      - bip_network

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - product-service
      - order-service
    networks:
      - bip_network

  product-service:
    build:
      context: ./product-service
    container_name: product-service
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - MONGO_URI=mongodb://${MONGO_USER:-root}:${MONGO_PASS:-root}@mongodb:27017/product_db?authSource=admin
    depends_on:
      - mongodb
    networks:
      - bip_network

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - MONGO_URI=mongodb://${MONGO_USER:-root}:${MONGO_PASS:-root}@mongodb:27017/order_db?authSource=admin
      - PRODUCT_SERVICE_URL=http://product-service:8001
    depends_on:
      - mongodb
      - product-service
    networks:
      - bip_network

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api-gateway
    networks:
      - bip_network

volumes:
  mongo_data:

networks:
  bip_network:
    driver: bridge
